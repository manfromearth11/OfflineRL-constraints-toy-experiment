# Multi-modal scenario: 5 behavior modes + outliers + noisy Q + fitted model
# This scenario is designed to show OT advantages:
#   - Multiple good/mediocre/bad modes with small reward gaps
#   - Noisy Q makes advantage weighting unreliable
#   - Partial OT uses geometric proximity to filter outliers and bad modes
#   - MDN policy can capture multi-modality

env:
  state_range: [-3, 3]
  n_data: 15000
  outlier_fraction: 0.2
  modes:
    # Two good modes (near-optimal, small offset)
    - {offset: [0.0, 0.0],  std: 0.25, weight: 0.15}   # good: right at optimal
    - {offset: [0.0, 1.5],  std: 0.25, weight: 0.15}   # good: offset but close
    # Two mediocre modes (moderate offset)
    - {offset: [1.5, 0.0],  std: 0.35, weight: 0.15}   # mediocre
    - {offset: [-1.0, 2.5], std: 0.35, weight: 0.15}   # mediocre
    # Two bad modes (far from optimal)
    - {offset: [3.0, 3.0],  std: 0.4,  weight: 0.2}    # bad
    - {offset: [-2.0, 3.5], std: 0.4,  weight: 0.2}    # bad

training:
  lr: 1.0e-3
  batch_size: 256
  n_epochs: 300
  seed: 42

corruption:
  q_noise_std: 3.0
  use_fitted_behavior: true

bc: {}

kl_forward:
  alpha: 0.5    # lower alpha → sharper weighting (harder to be accurate with noise)

kl_reverse:
  alpha: 0.5
  beta: 0.1

ot_wasserstein:
  lam: 1.0
  n_ot_samples: 32
  n_ot_states: 16

ot_partial:
  lam: 1.0
  mass_fraction: 0.3    # transport only top 30% → keep only good modes
  n_ot_samples: 32
  n_ot_states: 16

ot_unbalanced:
  lam: 1.0
  entropic_reg: 0.1
  marginal_reg: 0.5     # lower → more aggressive outlier rejection
  n_ot_samples: 32
  n_ot_states: 16

viz:
  n_grid: 50
  representative_states: [[0, 0], [1, 1], [-1, 2], [2, -1]]
  n_plot_samples: 500

policy:
  type: gmm
  n_components: 5
