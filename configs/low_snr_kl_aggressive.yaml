# Low SNR variant with aggressive KL weighting (lower alpha).
# Used to test regimes where noisy Q can mislead KL updates.

env:
  state_range: [-3, 3]
  n_data: 15000
  outlier_fraction: 0.15
  modes:
    - {offset: [0.0, 0.0],  std: 0.15, weight: 0.15}
    - {offset: [0.1, -0.1], std: 0.15, weight: 0.15}
    - {offset: [0.5, 0.5],  std: 0.5, weight: 0.15}
    - {offset: [-0.3, 0.7], std: 0.5, weight: 0.15}
    - {offset: [1.2, 1.2],  std: 0.8, weight: 0.2}
    - {offset: [-0.8, 1.8], std: 0.8, weight: 0.2}

training:
  lr: 1.0e-3
  batch_size: 256
  n_epochs: 300
  seed: 42

corruption:
  q_noise_std: 6.0
  use_fitted_behavior: true

bc: {}

kl_forward:
  alpha: 0.5

kl_reverse:
  alpha: 0.5
  beta: 0.1

ot_wasserstein:
  lam: 5.0
  n_ot_samples: 32
  n_ot_states: 16

ot_partial:
  lam: 5.0
  mass_fraction: 0.3
  n_ot_samples: 32
  n_ot_states: 16

ot_unbalanced:
  lam: 5.0
  entropic_reg: 0.05
  marginal_reg: 0.3
  n_ot_samples: 32
  n_ot_states: 16

viz:
  n_grid: 50
  representative_states: [[0, 0], [1, 1], [-1, 2], [2, -1]]
  n_plot_samples: 500

policy:
  type: gmm
  n_components: 5
